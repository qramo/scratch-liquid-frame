<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scratch Project Embed</title>
    <style>
      :root {
        color-scheme: light;
        background: #f7f8fb;
        color: #20242b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .page {
        width: min(100%, 1200px);
        min-height: min(100vh, 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.5rem, 2vw, 2.2rem);
        text-align: center;
      }

      .iframe-container {
        width: min(100%, 485px);
        aspect-ratio: 485 / 402;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        border-radius: 18px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      }

      @media (max-width: 900px) {
        body {
          padding: 16px;
        }

        .page {
          width: 100%;
          min-height: 100vh;
          gap: 16px;
        }

        .iframe-container {
          width: 100%;
          aspect-ratio: 485 / 402;
          max-width: 100%;
        }
      }

      @media (max-width: 900px) and (orientation: landscape) {
        body {
          padding: 12px;
        }

        .page {
          min-height: 100vh;
          justify-content: center;
        }

        .iframe-container {
          width: auto;
          height: min(100vh - 24px, 100%);
          max-height: 100vh;
          aspect-ratio: auto;
        }

        iframe {
          width: auto;
          height: 100%;
          max-width: 100vw;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>Scratch Project Embed</h1>
      <div class="iframe-container">
        <iframe
          src="https://scratch.mit.edu/projects/1326666099/embed"
          allowtransparency="true"
          scrolling="no"
          allowfullscreen
        ></iframe>
      </div>
    </div>
  </body>
</html>
